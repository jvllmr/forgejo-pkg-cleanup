name: Cleanup

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  container-images:
    runs-on: docker
    name: Container-Images
    steps:
      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Cleanup
        uses: ./
        with:
          instance: https://codeberg.org
          username: jvllmr
          password: ${{ secrets.PUBLISH_TOKEN }}
          package: ^forgejo-pkg-cleanup(?:-cache)?$
          packageType: container
          owner: jvllmr
          keepVersions: ^(?:(?:v)?(?:\d+)(?:\.(\d+))?(?:\.(\d+))?(?:[a|b]\d+)?)?(?:main)?$
          retention: 6h
