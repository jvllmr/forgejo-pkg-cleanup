name: Cleanup

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  container-images:
    runs-on: docker
    name: Container-Images
    steps:
      - name: Cleanup
        uses: ./
        with:
          instance: https://codeberg.org
          username: jvllmr
          password: ${{ secrets.PUBLISH_TOKEN }}
          package: ^forgejo-pkg-cleanup(?:-cache)?$
          packageType: container
          owner: jvllmr
          keepVersions: ^(?:v)?(?:\d+)(?:\.(\d+))?(?:\.(\d+))?(?:[a|b]\d+)?$
          retention: 2d
