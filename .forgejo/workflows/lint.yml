name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    permissions:
      contents: read
    name: pre-commit
    runs-on: ubuntu-full
    steps:
      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: https://github.com/actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.13.0
      - name: Setup go
        uses: https://github.com/actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ">=1.25.7"
          token: ${{ secrets.GH_PAT }}
      - name: Install uv with all available options
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          github-token: ${{ secrets.GH_PAT }}
      - uses: https://github.com/j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
